<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threads Clipper</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
:root{--paper:#f6f4ef;--card:#fffdf8;--ink:#1c1c1f;--soft:#706b5d;--line:#ded6c4;--navy:#243b55;--green:#426b58;--red:#cc4d35;--gold:#c2943d}
*{box-sizing:border-box}.hidden{display:none!important}body{margin:0;background:var(--paper);color:var(--ink);font-family:Pretendard,-apple-system,sans-serif;line-height:1.5}.app{max-width:760px;margin:0 auto;padding:28px 18px 80px}.eyebrow{font-size:12px;letter-spacing:.12em;color:var(--soft);font-weight:800;text-transform:uppercase}h1{font-size:34px;line-height:1.1;margin:4px 0;color:var(--navy)}.stats{font-size:13px;color:var(--soft)}.badge{display:inline-block;background:var(--navy);color:#fff;font-size:11px;padding:2px 8px;border-radius:999px;margin-left:6px;font-weight:800}.toolbar{display:grid;grid-template-columns:1fr auto;gap:8px;margin:20px 0 10px}.toolbar input,.toolbar select,.form-row input,.form-row textarea,.form-row select{padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;font:inherit;font-size:14px;color:var(--ink)}.filters{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}.ghost-btn,.add-launcher,.btn-secondary,.icon-btn{border:1px solid var(--line);background:var(--card);color:var(--soft);border-radius:8px;font:inherit;font-size:13px;font-weight:800;cursor:pointer}.ghost-btn{padding:10px 14px;white-space:nowrap}.ghost-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}.add-launcher{width:100%;border-style:dashed;color:var(--navy);padding:13px;margin-bottom:18px}.form-wrap{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:22px}.form-wrap h3{margin:0 0 14px;color:var(--navy);font-size:16px}.form-row{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}.form-row label{font-size:12px;color:var(--soft);font-weight:800}.form-row textarea{min-height:130px;resize:vertical}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.form-hint{font-size:12px;color:var(--soft);margin:-4px 0 12px}.form-actions{display:flex;flex-wrap:wrap;gap:8px}.btn-primary{background:var(--red);color:#fff;border:0;padding:10px 16px;border-radius:8px;font:inherit;font-weight:800;cursor:pointer}.btn-secondary,.icon-btn{padding:9px 13px}.clip-list{display:grid;gap:14px}.clip-card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}.clip-thumb{height:230px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:24px}.clip-thumb img{width:100%;height:100%;object-fit:cover;display:block}.clip-body{padding:14px}.clip-top{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}.tag{display:inline-flex;background:#edf0e9;color:var(--green);border-radius:999px;padding:3px 8px;font-size:11px;font-weight:800}.status{background:#eef1f5;color:var(--navy)}.clip-title{font-weight:900;font-size:16px;margin-bottom:5px;word-break:break-word}.clip-meta,.clip-note{font-size:12.5px;color:var(--soft)}.clip-note{margin-top:8px;white-space:pre-wrap}.clip-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.link-btn{background:var(--navy);color:#fff;border:0;padding:8px 12px;border-radius:8px;font:inherit;font-size:13px;font-weight:800;cursor:pointer}.icon-btn.danger{color:var(--red);border-color:var(--red)}.empty{padding:48px 16px;border:1px dashed var(--line);border-radius:12px;color:var(--soft);text-align:center}.modal-overlay,.gate-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:18px;z-index:20}.modal-overlay{background:rgba(28,28,31,.46)}.modal,.gate-card{background:var(--card);border-radius:14px;padding:24px;max-width:360px;width:100%}.modal h3,.gate-card h2{margin:0 0 12px;color:var(--navy)}.modal p,.gate-card p{font-size:13px;color:var(--soft);margin:0 0 14px}.modal input,.gate-card input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font:inherit;margin-bottom:10px}.modal-error,.gate-error{color:var(--red);font-size:12px;min-height:14px}.modal-actions{display:flex;gap:8px;justify-content:flex-end}.gate-overlay{background:var(--navy);z-index:40}.gate-card{text-align:center}.gate-card button{width:100%;background:var(--red);color:#fff;border:0;padding:11px;border-radius:8px;font:inherit;font-weight:900;cursor:pointer}footer{margin-top:36px;font-size:11.5px;color:var(--soft);text-align:center}@media(max-width:520px){.toolbar,.filters,.form-grid{grid-template-columns:1fr}.clip-thumb{height:190px}}
</style>
</head>
<body>
<div class="gate-overlay" id="gateOverlay"><div class="gate-card" id="gateCard"></div></div>
<div class="app hidden" id="appRoot">
  <header>
    <div class="eyebrow">Private Threads Archive</div>
    <h1>Threads Clipper</h1>
    <div class="stats" id="stats">불러오는 중...</div>
  </header>
  <div class="toolbar">
    <input type="search" id="searchInput" placeholder="제목, 메모, 태그로 찾기">
    <button class="ghost-btn" id="adminBtn">관리자</button>
  </div>
  <div class="filters">
    <select id="statusFilter">
      <option value="">모든 상태</option>
      <option value="later">나중에 볼 것</option>
      <option value="reading">읽는 중</option>
      <option value="done">다 봄</option>
      <option value="important">중요</option>
    </select>
    <input type="search" id="tagFilter" placeholder="태그 필터">
  </div>
  <button class="add-launcher hidden" id="addLauncher">+ Threads 링크 저장</button>
  <div class="form-wrap hidden" id="formWrap"></div>
  <div class="clip-list hidden" id="clipList"></div>
  <div class="empty hidden" id="emptyState"><b>아직 저장한 클립이 없어요.</b><br>관리자 모드에서 Threads 링크를 붙여넣으면 여기에 쌓입니다.</div>
  <footer>클립 목록은 공유 저장소에, 검색/필터는 브라우저에서 즉시 처리됩니다.</footer>
</div>
<div class="modal-overlay hidden" id="modalOverlay"><div class="modal" id="modalBody"></div></div>
<script>
(() => {
  const SITE_PASSWORD = "1149";
  const KEY_CLIPS = "clips";
  let clips = [];
  let adminMode = false;
  let adminPassword = "";
  let editingId = null;
  let searchTerm = "";
  let statusFilter = "";
  let tagFilter = "";
  let loaded = false;

  const $ = (sel) => document.querySelector(sel);
  const todayStr = () => new Date().toISOString().slice(0, 10);
  const newId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  const escapeHtml = (str) => String(str ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  const statusLabel = (value) => ({ later: "나중에", reading: "읽는 중", done: "다 봄", important: "중요" }[value] || "미분류");
  const sortedClips = () => [...clips].sort((a, b) => String(b.savedAt || "").localeCompare(String(a.savedAt || "")));

  async function storageGet(key) {
    const res = await fetch(`/api/storage?key=${encodeURIComponent(key)}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "저장소를 불러오지 못했어요.");
    return JSON.parse(data.value || "[]");
  }

  async function storageSet(key, value) {
    const res = await fetch("/api/storage", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ key, value: JSON.stringify(value), adminPassword })
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || "저장에 실패했어요.");
  }

  async function apiAuth(password) {
    const res = await fetch("/api/storage", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "auth", adminPassword: password })
    });
    return res.ok;
  }

  async function apiGetMeta(url) {
    try {
      const res = await fetch(`/api/meta?url=${encodeURIComponent(url)}`);
      return res.ok ? await res.json() : { title: "", image: "" };
    } catch {
      return { title: "", image: "" };
    }
  }

  function showModal(html) {
    $("#modalBody").innerHTML = html;
    $("#modalOverlay").classList.remove("hidden");
  }

  function hideModal() {
    $("#modalOverlay").classList.add("hidden");
    $("#modalBody").innerHTML = "";
  }

  function parseTags(value) {
    return String(value || "").split(/[,\n]/).map((tag) => tag.trim()).filter(Boolean);
  }

  function parseQuickEntries(text) {
    const seen = new Set(clips.map((clip) => clip.url));
    const urlPattern = /https?:\/\/[^\s<>"'`]+/g;
    return text.split(/\n+/).flatMap((line) => {
      const urls = line.match(urlPattern) || [];
      return urls.map((rawUrl) => {
        const url = rawUrl.replace(/[),.!?]+$/, "");
        const title = line.replace(rawUrl, "").replace(/[-–—|:]+$/, "").trim();
        if (seen.has(url)) return null;
        seen.add(url);
        return { title, url };
      }).filter(Boolean);
    });
  }

  function filteredClips() {
    const q = searchTerm.toLowerCase();
    const tag = tagFilter.toLowerCase();
    return sortedClips().filter((clip) => {
      const haystack = [clip.title, clip.note, clip.url, ...(clip.tags || [])].join(" ").toLowerCase();
      const matchesSearch = !q || haystack.includes(q);
      const matchesStatus = !statusFilter || clip.status === statusFilter;
      const matchesTag = !tag || (clip.tags || []).some((item) => item.toLowerCase().includes(tag));
      return matchesSearch && matchesStatus && matchesTag;
    });
  }

  function render() {
    $("#stats").innerHTML = loaded ? `총 ${clips.length}개 클립${adminMode ? '<span class="badge">관리자 모드</span>' : ""}` : "불러오는 중...";
    renderAdminUI();
    renderClips();
  }

  function renderAdminUI() {
    $("#adminBtn").textContent = adminMode ? "관리자 모드 해제" : "관리자";
    $("#adminBtn").classList.toggle("active", adminMode);
    $("#addLauncher").classList.toggle("hidden", !adminMode || Boolean(editingId));
    if (!adminMode) cancelForm(false);
  }

  function renderClips() {
    if (!loaded) return;
    const list = filteredClips();
    $("#emptyState").classList.toggle("hidden", clips.length > 0);
    $("#clipList").classList.toggle("hidden", clips.length === 0);
    $("#clipList").innerHTML = list.map((clip) => {
      const thumb = clip.thumb ? `<img src="${escapeHtml(clip.thumb)}" alt="" loading="lazy" onerror="this.parentElement.textContent='THREADS'">` : "THREADS";
      const tags = (clip.tags || []).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("");
      return `<article class="clip-card">
        <div class="clip-thumb">${thumb}</div>
        <div class="clip-body">
          <div class="clip-top"><span class="tag status">${statusLabel(clip.status)}</span>${tags}</div>
          <div class="clip-title">${escapeHtml(clip.title || "Untitled")}</div>
          <div class="clip-meta">${escapeHtml(clip.savedAt || "")}</div>
          ${clip.note ? `<div class="clip-note">${escapeHtml(clip.note)}</div>` : ""}
          <div class="clip-actions">
            <button class="link-btn" onclick="window.__openClip('${clip.id}')">Threads에서 보기</button>
            ${adminMode ? `<button class="icon-btn" onclick="window.__editClip('${clip.id}')">수정</button><button class="icon-btn danger" onclick="window.__deleteClip('${clip.id}')">삭제</button>` : ""}
          </div>
        </div>
      </article>`;
    }).join("");
  }

  function showQuickAdd() {
    editingId = null;
    $("#formWrap").innerHTML = `<h3>Threads 링크 저장</h3>
      <div class="form-row"><label>링크</label><textarea id="quickLinks" placeholder="Threads 링크를 한 줄에 하나씩 붙여넣기&#10;제목 https://www.threads.com/... 형식도 가능"></textarea></div>
      <div class="form-grid">
        <div class="form-row"><label>상태</label><select id="quickStatus"><option value="later">나중에 볼 것</option><option value="reading">읽는 중</option><option value="done">다 봄</option><option value="important">중요</option></select></div>
        <div class="form-row"><label>태그</label><input id="quickTags" placeholder="경제, 아이디어, 만화"></div>
      </div>
      <div class="form-row"><label>메모</label><textarea id="quickNote" placeholder="왜 저장했는지, 나중에 찾을 단서"></textarea></div>
      <div class="form-hint">제목과 썸네일은 Threads 메타데이터에서 자동으로 가져옵니다. 이미 저장된 링크는 건너뜁니다.</div>
      <div class="modal-error" id="formError"></div>
      <div class="form-actions"><button class="btn-primary" id="quickSave">저장</button><button class="btn-secondary" id="detailAdd">상세 입력</button><button class="btn-secondary" id="formCancel">취소</button></div>`;
    $("#formWrap").classList.remove("hidden");
    $("#addLauncher").classList.add("hidden");
    $("#quickSave").addEventListener("click", saveQuickAdd);
    $("#detailAdd").addEventListener("click", () => showForm());
    $("#formCancel").addEventListener("click", () => cancelForm());
    $("#formWrap").scrollIntoView({ behavior: "smooth", block: "center" });
    $("#quickLinks").focus();
  }

  function showForm(id = null) {
    editingId = id;
    const clip = id ? clips.find((item) => item.id === id) : null;
    $("#formWrap").innerHTML = `<h3>${clip ? "클립 수정" : "클립 상세 입력"}</h3>
      <div class="form-row"><label>제목</label><input id="fTitle" value="${escapeHtml(clip?.title || "")}"></div>
      <div class="form-row"><label>Threads 링크</label><input type="url" id="fUrl" value="${escapeHtml(clip?.url || "")}"></div>
      <div class="form-grid">
        <div class="form-row"><label>상태</label><select id="fStatus"><option value="later">나중에 볼 것</option><option value="reading">읽는 중</option><option value="done">다 봄</option><option value="important">중요</option></select></div>
        <div class="form-row"><label>태그</label><input id="fTags" value="${escapeHtml((clip?.tags || []).join(", "))}"></div>
      </div>
      <div class="form-row"><label>썸네일 이미지 URL</label><input id="fThumb" value="${escapeHtml(clip?.thumb || "")}"></div>
      <div class="form-row"><label>메모</label><textarea id="fNote">${escapeHtml(clip?.note || "")}</textarea></div>
      <div class="modal-error" id="formError"></div>
      <div class="form-actions"><button class="btn-primary" id="formSave">저장</button><button class="btn-secondary" id="formCancel">취소</button></div>`;
    $("#formWrap").classList.remove("hidden");
    $("#addLauncher").classList.add("hidden");
    $("#fStatus").value = clip?.status || "later";
    $("#formSave").addEventListener("click", saveForm);
    $("#formCancel").addEventListener("click", () => cancelForm());
    $("#formWrap").scrollIntoView({ behavior: "smooth", block: "center" });
  }

  function cancelForm(update = true) {
    editingId = null;
    $("#formWrap").classList.add("hidden");
    $("#formWrap").innerHTML = "";
    if (update) renderAdminUI();
  }

  async function saveQuickAdd() {
    const entries = parseQuickEntries($("#quickLinks").value);
    const errEl = $("#formError");
    if (!entries.length) {
      errEl.textContent = "새로 저장할 링크를 찾지 못했어요.";
      return;
    }
    $("#quickSave").disabled = true;
    $("#quickSave").textContent = "썸네일 불러오는 중...";
    const tags = parseTags($("#quickTags").value);
    const note = $("#quickNote").value.trim();
    const status = $("#quickStatus").value;
    const savedAt = todayStr();
    const enriched = await Promise.all(entries.map(async (entry) => ({ ...entry, meta: await apiGetMeta(entry.url) })));
    const newClips = enriched.map((entry) => ({
      id: newId(),
      title: entry.title || entry.meta?.title || "Untitled",
      url: entry.url,
      thumb: entry.meta?.image || "",
      tags,
      note,
      status,
      savedAt
    }));
    clips.push(...newClips);
    try {
      $("#quickSave").textContent = "저장 중...";
      await storageSet(KEY_CLIPS, clips);
      cancelForm();
      render();
    } catch (error) {
      clips = clips.filter((clip) => !newClips.some((item) => item.id === clip.id));
      errEl.textContent = error.message;
      $("#quickSave").disabled = false;
      $("#quickSave").textContent = "저장";
    }
  }

  async function saveForm() {
    const title = $("#fTitle").value.trim();
    const url = $("#fUrl").value.trim();
    if (!title || !url) {
      $("#formError").textContent = "제목과 링크는 꼭 입력해야 해요.";
      return;
    }
    try { new URL(url); } catch { $("#formError").textContent = "링크 형식이 올바르지 않아요."; return; }
    const item = {
      id: editingId || newId(),
      title,
      url,
      thumb: $("#fThumb").value.trim(),
      tags: parseTags($("#fTags").value),
      note: $("#fNote").value.trim(),
      status: $("#fStatus").value,
      savedAt: editingId ? clips.find((clip) => clip.id === editingId)?.savedAt || todayStr() : todayStr()
    };
    if (editingId) Object.assign(clips.find((clip) => clip.id === editingId), item);
    else clips.push(item);
    try {
      await storageSet(KEY_CLIPS, clips);
      cancelForm();
      render();
    } catch (error) {
      $("#formError").textContent = error.message;
    }
  }

  function openClip(id) {
    const clip = clips.find((item) => item.id === id);
    if (clip?.url) window.open(clip.url, "_blank", "noopener");
  }

  async function deleteClip(id) {
    if (!confirm("이 클립을 삭제할까요?")) return;
    const before = clips;
    clips = clips.filter((clip) => clip.id !== id);
    try {
      await storageSet(KEY_CLIPS, clips);
      render();
    } catch (error) {
      clips = before;
      alert(error.message);
    }
  }

  function handleAdminClick() {
    if (adminMode) {
      adminMode = false;
      adminPassword = "";
      render();
      return;
    }
    showModal(`<h3>관리자 비밀번호 입력</h3><p>클립 추가, 수정, 삭제는 서버에서 비밀번호를 확인한 뒤 저장됩니다.</p><input type="password" id="pwTry" placeholder="비밀번호"><div class="modal-error" id="pwErr"></div><div class="modal-actions"><button class="btn-secondary" id="pwCancel">취소</button><button class="btn-primary" id="pwOk">확인</button></div>`);
    $("#pwCancel").addEventListener("click", hideModal);
    const tryLogin = async () => {
      const value = $("#pwTry").value;
      if (await apiAuth(value)) {
        adminPassword = value;
        adminMode = true;
        hideModal();
        render();
      } else {
        $("#pwErr").textContent = "비밀번호가 맞지 않아요.";
      }
    };
    $("#pwOk").addEventListener("click", tryLogin);
    $("#pwTry").addEventListener("keydown", (e) => { if (e.key === "Enter") tryLogin(); });
  }

  function renderGate() {
    $("#gateCard").innerHTML = `<h2>Threads Clipper</h2><p>입장 비밀번호를 입력해주세요.</p><input type="password" id="gatePwTry" placeholder="비밀번호"><div class="gate-error" id="gateErr"></div><button id="gateEnterBtn">입장하기</button>`;
    const enter = () => {
      if ($("#gatePwTry").value === SITE_PASSWORD) unlockSite();
      else $("#gateErr").textContent = "비밀번호가 맞지 않아요.";
    };
    $("#gateEnterBtn").addEventListener("click", enter);
    $("#gatePwTry").addEventListener("keydown", (e) => { if (e.key === "Enter") enter(); });
  }

  async function unlockSite() {
    $("#gateOverlay").classList.add("hidden");
    $("#appRoot").classList.remove("hidden");
    try {
      clips = await storageGet(KEY_CLIPS);
    } catch (error) {
      clips = [];
      showModal(`<h3>저장소 연결 필요</h3><p>${escapeHtml(error.message)}</p><div class="modal-actions"><button class="btn-primary" id="modalOk">확인</button></div>`);
      $("#modalOk").addEventListener("click", hideModal);
    }
    loaded = true;
    render();
  }

  window.__openClip = openClip;
  window.__editClip = showForm;
  window.__deleteClip = deleteClip;
  $("#modalOverlay").addEventListener("click", (e) => { if (e.target.id === "modalOverlay") hideModal(); });
  $("#adminBtn").addEventListener("click", handleAdminClick);
  $("#addLauncher").addEventListener("click", showQuickAdd);
  $("#searchInput").addEventListener("input", (e) => { searchTerm = e.target.value; renderClips(); });
  $("#statusFilter").addEventListener("change", (e) => { statusFilter = e.target.value; renderClips(); });
  $("#tagFilter").addEventListener("input", (e) => { tagFilter = e.target.value; renderClips(); });
  renderGate();
})();
</script>
</body>
</html>
